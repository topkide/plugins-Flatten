# ────────────────────────────────────────────
#  Flatten (평탄화) 설정
# ────────────────────────────────────────────

# 기본 기준 Y 좌표
#   - 이 Y 좌표(포함) 이상의 모든 블록을 제거(공기)
#   - 바로 아래(Y-1)는 아래 surface-block 으로 채움
default-y: 64

# 기본 반경(칸). 플레이어 중심으로 (2r+1) x (2r+1) 영역 처리
default-radius: 3

# 명령어로 지정 가능한 최대 반경 (성능 보호용 상한)
max-radius: 20

# 지정 Y 바로 아래(Y-1)를 채울 블록
surface-block: GRASS_BLOCK

# 반경을 원형으로 처리할지 여부 (false = 정사각형)
circle: false

# 블록 변경 시 물리 효과(연쇄 갱신) 적용 여부.
#   false 권장 - 모래 낙하/물 흐름/횃불 탈락 등 연쇄 방지 + 성능 향상
apply-physics: false

# 평탄화를 비활성화할 월드 목록 (예: ["world_the_end", "spawn"])
disabled-worlds: []
